<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Verification Code</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f3f3f3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f3f3f3; padding: 40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="400" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 16px; border: 1px solid #0000001a; overflow: hidden;">
          <!-- Header -->
          <tr>
            <td style="padding: 32px 32px 0 32px; text-align: center;">
              <span style="font-size: 20px; font-weight: 700; color: #0d0d0d; letter-spacing: -0.5px;">Workley Assistant</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding: 24px 32px 0 32px; text-align: center;">
              <h1 style="margin: 0 0 8px 0; font-size: 20px; font-weight: 600; color: #0d0d0d;">Your verification code</h1>
              <p style="margin: 0 0 24px 0; font-size: 14px; color: #00000099;">Enter this code to verify your email address</p>
            </td>
          </tr>
          <!-- OTP Code -->
          <tr>
            <td style="padding: 0 32px; text-align: center;">
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
                <tr>
                  {{OTP_DIGITS}}
                </tr>
              </table>
            </td>
          </tr>
          <!-- Expiry notice -->
          <tr>
            <td style="padding: 24px 32px 0 32px; text-align: center;">
              <p style="margin: 0; font-size: 13px; color: #00000099;">This code expires in 5 minutes</p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 32px 32px 32px 32px; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #0000004a;">If you didn't request this code, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
