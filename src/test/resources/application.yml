server:
  error:
    include-message: always
  reactive:
    session:
      timeout: 30d
      cookie:
        name: SESSION
        secure: false
        max-age: 30d
        http-only: true
        same-site: lax
  forward-headers-strategy: framework
spring:
  ai:
    openai:
      api-key: test-key
      chat:
        options:
          model: gpt-5-nano
          temperature: 0.8
gateway:
  security:
    anonymous:
      jwt:
        secret: secret
    auth:
      jwt:
        secret: auth-secret
      cookie:
        prefix: ""
