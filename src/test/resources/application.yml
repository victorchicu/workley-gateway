server:
  error:
    include-message: always
  reactive:
    session:
      timeout: 30d
      cookie:
        name: SESSION
        secure: false
        max-age: 30d
        http-only: true
        same-site: lax
  forward-headers-strategy: framework
spring:
  ai:
    openai:
      api-key: test-key
      chat:
        options:
          model: gpt-5-nano
          temperature: 0.8
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: workley-gateway
              uri: http://localhost:8443
              predicates:
                - Path=/api/command/**
                - Path=/api/chats/**
                - Path=/api/auth/**
gateway:
  security:
    anonymous:
      jwt:
        secret: secret
    auth:
      jwt:
        secret: auth-secret
      cookie:
        prefix: ""
